<div class="page-container">

  <!-- Header -->
  <div class="list-header">
    <div class="title-section">
      <mat-icon class="hero-icon">auto_awesome</mat-icon>
      <h1>Superhéroes</h1>
    </div>
    <button mat-flat-button color="primary" (click)="navigateToCreate()">
      <mat-icon>add</mat-icon>
      Nuevo héroe
    </button>
  </div>

  <!-- Search bar -->
  <mat-form-field appearance="outline" class="search-field">
    <mat-label>Buscar por nombre</mat-label>
    <mat-icon matPrefix>search</mat-icon>
    <input
      id="heroSearch"
      aria-label="Buscar por nombre"
      matInput
      [formControl]="searchControl"
      placeholder="Ej: SPIDERMAN, MAN, THOR..."
      appUppercase
    />
    @if (searchControl.value) {
      <button matSuffix mat-icon-button aria-label="Limpiar búsqueda" (click)="clearSearch()">
        <mat-icon>close</mat-icon>
      </button>
    }
  </mat-form-field>

  <!-- Table -->
  <mat-card class="table-card">
    @if (loadingService.isLoading()) {
      <div class="loading-overlay">
        <mat-spinner diameter="56" />
      </div>
    }
    <mat-card-content>
      <div class="table-wrapper">
        <table mat-table [dataSource]="dataSource" class="heroes-table">

          <!-- Name column -->
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef>Nombre</th>
            <td mat-cell *matCellDef="let hero">
              <div class="hero-cell">
                <img class="hero-avatar" [src]="hero.img || defaultImg" [alt]="hero.name" (error)="onImgError($event)" />
                <span class="hero-name">{{ hero.name }}</span>
              </div>
            </td>
          </ng-container>

          <!-- Real name column -->
          <ng-container matColumnDef="realName">
            <th mat-header-cell *matHeaderCellDef>Nombre real</th>
            <td mat-cell *matCellDef="let hero">{{ hero.realName }}</td>
          </ng-container>

          <!-- Universe column -->
          <ng-container matColumnDef="universe">
            <th mat-header-cell *matHeaderCellDef>Universo</th>
            <td mat-cell *matCellDef="let hero">
              <mat-chip [class]="'universe-' + hero.universe.toUpperCase()">
                {{ hero.universe }}
              </mat-chip>
            </td>
          </ng-container>

          <!-- Year column -->
          <ng-container matColumnDef="year">
            <th mat-header-cell *matHeaderCellDef>Año de 1ª aparición</th>
            <td mat-cell *matCellDef="let hero">{{ hero.year }}</td>
          </ng-container>

          <!-- Actions -->
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Acciones</th>
            <td mat-cell *matCellDef="let hero">
              <button
                mat-icon-button
                color="accent"
                matTooltip="Ver detalle"
                (click)="navigateToDetail(hero)"
              >
                <mat-icon>visibility</mat-icon>
              </button>
              <button
                mat-icon-button
                color="primary"
                matTooltip="Editar héroe"
                (click)="navigateToEdit(hero)"
              >
                <mat-icon>edit</mat-icon>
              </button>
              <button
                mat-icon-button
                color="warn"
                matTooltip="Eliminar héroe"
                (click)="openDeleteDialog(hero)"
              >
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

            <!-- Empty state -->
          <tr class="mat-row" *matNoDataRow>
            <td class="mat-cell empty-state" [attr.colspan]="displayedColumns.length">
              <mat-icon>search_off</mat-icon>
              <p>No se encontraron héroes.</p>
            </td>
          </tr>
        </table>
      </div>

      <mat-paginator
        [pageSizeOptions]="[5, 10, 25]"
        [pageSize]="5"
        showFirstLastButtons
        aria-label="Paginación de héroes"
      />
    </mat-card-content>
  </mat-card>

</div>
